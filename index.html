<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemesanan Tiket & Pengiriman Email</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 1. Import Library EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        // Inisialisasi EmailJS dengan Public Key kamu
        (function() {
            emailjs.init("2EJLv0x3aQtzNDazt"); 
        })();
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-sans relative">

    <!-- Tempat Notifikasi -->
    <div id="notifikasi" class="hidden fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full text-white font-medium shadow-lg transition-all duration-300 opacity-0 -translate-y-4">
    </div>

    <!-- Container Utama Form -->
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-center">
            <h1 class="text-2xl font-bold text-white mb-1">Pesan Tiketmu!</h1>
            <p class="text-blue-100 text-sm">Tiket akan dikirimkan ke email Anda.</p>
        </div>

        <div class="p-8">
            <form id="form-pemesanan" class="space-y-5">
                
                <div>
                    <label for="nama" class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="nama" required placeholder="Contoh: Budi Santoso" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-gray-50 focus:bg-white">
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email Anda (Untuk pengiriman tiket)</label>
                    <input type="email" id="email" required placeholder="email.anda@gmail.com" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-gray-50 focus:bg-white">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="jenis" class="block text-sm font-semibold text-gray-700 mb-1">Jenis Tiket</label>
                        <select id="jenis" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 focus:bg-white transition-all cursor-pointer">
                            <option value="Reguler">Reguler</option>
                            <option value="VIP">VIP</option>
                            <option value="VVIP">VVIP</option>
                        </select>
                    </div>
                    <div>
                        <label for="jumlah" class="block text-sm font-semibold text-gray-700 mb-1">Jumlah</label>
                        <input type="number" id="jumlah" required min="1" max="10" value="1" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 focus:bg-white transition-all text-center">
                    </div>
                </div>

                <div class="bg-blue-50 p-4 rounded-xl mt-6 flex justify-between items-center border border-blue-100">
                    <div class="flex flex-col">
                        <span class="text-xs font-semibold text-blue-600 uppercase tracking-wider">Total Pembayaran</span>
                        <span class="text-xs text-gray-500" id="detail-harga">1 x Rp 50.000</span>
                    </div>
                    <span id="total-harga" class="text-xl font-bold text-blue-700">Rp 50.000</span>
                </div>
                
                <button type="submit" id="btn-submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-md transition-all duration-200 mt-4 flex justify-center items-center gap-2">
                    <span>Pesan & Kirim Tiket</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Script Firebase & Logika -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBPzVaOwVo7Vny6Zd1Hfuyn21neRAH5GQs",
            authDomain: "absen-fa8b4.firebaseapp.com",
            projectId: "absen-fa8b4",
            storageBucket: "absen-fa8b4.firebasestorage.app",
            messagingSenderId: "186875255423",
            appId: "1:186875255423:web:515159bf18f393de28fd4a",
            measurementId: "G-M8P1JXK4XZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tiketCollection = collection(db, "pesanan_tiket");

        const formPemesanan = document.getElementById('form-pemesanan');
        const notifikasi = document.getElementById('notifikasi');
        const btnSubmit = document.getElementById('btn-submit');
        const jenisInput = document.getElementById('jenis');
        const jumlahInput = document.getElementById('jumlah');
        const totalHargaPreview = document.getElementById('total-harga');
        const detailHargaPreview = document.getElementById('detail-harga');

        const daftarHarga = { 'Reguler': 50000, 'VIP': 100000, 'VVIP': 200000 };
        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        function hitungTotal() {
            const hargaSatuan = daftarHarga[jenisInput.value];
            const jumlah = parseInt(jumlahInput.value) || 0;
            totalHargaPreview.textContent = formatRupiah(hargaSatuan * jumlah);
            detailHargaPreview.textContent = `${jumlah} x ${formatRupiah(hargaSatuan)}`;
        }

        jenisInput.addEventListener('change', hitungTotal);
        jumlahInput.addEventListener('input', hitungTotal);

        function tampilkanPesan(pesan, tipe = 'sukses') {
            notifikasi.textContent = pesan;
            notifikasi.className = `fixed top-6 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full text-white font-medium shadow-lg transition-all duration-300 ${tipe === 'sukses' ? 'bg-green-500' : 'bg-red-500'} translate-y-0 opacity-100`;
            setTimeout(() => {
                notifikasi.classList.replace('translate-y-0', '-translate-y-4');
                notifikasi.classList.replace('opacity-100', 'opacity-0');
            }, 5000);
        }

        formPemesanan.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            btnSubmit.innerHTML = "Menyimpan & Mengirim Email...";
            btnSubmit.disabled = true;

            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const jenis = jenisInput.value;
            const jumlah = parseInt(jumlahInput.value);
            const totalHarga = daftarHarga[jenis] * jumlah;

            try {
                // 1. Simpan ke Firebase Database
                await addDoc(tiketCollection, {
                    nama: nama,
                    email: email, 
                    jenis: jenis,
                    jumlah: jumlah,
                    totalHarga: totalHarga,
                    waktuPesan: serverTimestamp() 
                });

                // 2. Kirim Email pakai EmailJS
                const templateParams = {
                    to_name: nama,
                    to_email: email,
                    jenis_tiket: jenis,
                    jumlah_tiket: jumlah,
                    harga_satuan: formatRupiah(daftarHarga[jenis]), 
                    total_harga: formatRupiah(totalHarga),
                    order_id: "TKT-" + Math.floor(Math.random() * 1000000) 
                };

                // Menggunakan Template ID yang baru (template_jzzx5pg)
                await emailjs.send('service_g79vc44', 'template_jzzx5pg', templateParams);
                
                tampilkanPesan('🎉 Pesanan berhasil! Cek email Anda untuk detail tiket.');
                formPemesanan.reset(); 
                hitungTotal();
                
            } catch (error) {
                console.error("Error Detail:", error);
                tampilkanPesan('Data tersimpan, tapi gagal mengirim email. Cek koneksi.', 'error');
            } finally {
                btnSubmit.innerHTML = "Pesan & Kirim Tiket";
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
